name: Turn Scan

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build -o turn_scan .

      - name: Run scan
        run: |
          ./turn_scan \
            -c 100 \
            -p 500 \
            -pt 3 \
            -t 5 \
            -ct 8 \
            ip_list.txt

      - name: Delete old latest Release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest -y || true
          git push origin :refs/tags/latest || true

      - name: Create latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest TURN Scan
          body: |
            ## TURN 扫描结果

            此 Release 会在每次运行时自动更新。

            上传时间：${{ github.run_id }}
          files: |
            turn_results.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add turn_results.txt

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "update scan result $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi
